<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>부동산 세금 계산센터</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:   #3182f6;
      --bg:     #f2f4f6;
      --white:  #ffffff;
      --t1:     #191f28;
      --t2:     #4e5968;
      --t3:     #8b95a1;
      --border: #e5e8eb;
      --shadow: 0 1px 6px rgba(0,0,0,0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── 헤더 ── */
    .header {
      background: var(--white);
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid var(--border);
      transition: box-shadow .2s;
    }
    .header.scrolled { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .header-logo {
      font-size: 16px; font-weight: 700; color: var(--t1);
      display: flex; align-items: center; gap: 8px;
    }
    .logo-badge {
      width: 28px; height: 28px; background: var(--blue);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .logo-badge svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; }
    .header-menu { display: flex; gap: 2px; }
    .header-menu button {
      background: none; border: none; font-size: 13px; font-weight: 500;
      color: var(--t3); padding: 6px 10px; border-radius: 8px; cursor: pointer;
      font-family: inherit;
    }
    .header-menu button:active { background: var(--bg); }

    /* ── 히어로 (압축) ── */
    .hero {
      background: var(--white);
      padding: 20px 20px 18px;
      margin-bottom: 8px;
    }
    .hero-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg); color: var(--t3);
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 100px;
      margin-bottom: 10px;
    }
    .hero-tag .dot { width: 5px; height: 5px; background: var(--blue); border-radius: 50%; }
    .hero h1 {
      font-size: 22px; font-weight: 700; color: var(--t1);
      line-height: 1.35; margin-bottom: 6px; word-break: keep-all;
    }
    .hero p {
      font-size: 13px; color: var(--t2); line-height: 1.55; word-break: keep-all;
    }

    /* ── 섹션 타이틀 ── */
    .section-head { padding: 20px 20px 10px; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--t1); }

    /* ── 카드 리스트 ── */
    .card-list { display: flex; flex-direction: column; gap: 8px; padding: 0 20px 8px; }

    .calc-card {
      background: var(--white);
      border-radius: 16px;
      padding: 18px 16px;
      box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: transform .13s, box-shadow .13s;
      border: 1px solid transparent;
    }
    .calc-card:active {
      transform: scale(0.982);
      box-shadow: none;
      border-color: var(--border);
    }

    /* 아이콘 */
    .card-icon {
      width: 46px; height: 46px; border-radius: 14px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }

    /* 텍스트 */
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-size: 15px; font-weight: 700; color: var(--t1); margin-bottom: 3px; }
    .card-desc  { font-size: 12px; color: var(--t3); line-height: 1.5; word-break: keep-all; }

    /* 화살표 */
    .card-arrow { flex-shrink: 0; }
    .card-arrow svg { width: 18px; height: 18px; fill: none; stroke: var(--t3); stroke-width: 2; display: block; }

    /* ── 주의 안내 ── */
    .notice-section {
      margin: 4px 20px 8px;
      padding: 14px 16px;
      background: var(--white);
      border-radius: 12px;
      display: flex; gap: 10px; align-items: flex-start;
    }
    .notice-text { font-size: 11px; color: var(--t3); line-height: 1.7; word-break: keep-all; }
    .notice-text strong { color: var(--t2); font-weight: 600; }

    /* ── 상담 섹션 ── */
    .consult-section {
      margin: 0 20px 24px;
      background: var(--blue);
      border-radius: 16px;
      padding: 20px;
      color: #fff;
    }
    .consult-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; word-break: keep-all; }
    .consult-desc  { font-size: 12px; opacity: 0.8; line-height: 1.6; margin-bottom: 16px; word-break: keep-all; }
    .btn-consult {
      width: 100%; padding: 13px;
      background: rgba(255,255,255,0.15);
      color: #fff; border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .btn-consult:active { background: rgba(255,255,255,0.25); }

    /* ── 탭바 ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: var(--white); border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      z-index: 50;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px 0 8px; gap: 3px;
      background: none; border: none; cursor: pointer; font-family: inherit;
    }
    .tab-item svg { width: 22px; height: 22px; fill: none; stroke: var(--t3); stroke-width: 2; }
    .tab-item span { font-size: 10px; font-weight: 500; color: var(--t3); }
    .tab-item.active svg { stroke: var(--blue); }
    .tab-item.active span { color: var(--blue); font-weight: 700; }

    .tab-spacer { height: 68px; }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="header" id="header">
  <div class="header-logo">
    <div class="logo-badge">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    세금 계산센터
  </div>
  <div class="header-menu">
    <button onclick="location.href='consulting.html'">문의</button>
  </div>
</header>

<!-- 히어로 -->
<section class="hero">
  <div class="hero-tag"><div class="dot"></div>부동산 세금 계산기</div>
  <h1>복잡한 부동산 세금,<br>쉽게 계산하세요</h1>
  <p>취득세, 증여세, 상속세, 양도세를 한곳에서 확인해요.</p>
</section>

<!-- 카드 섹션 -->
<div class="section-head">
  <div class="section-title">계산기 선택</div>
</div>
<div class="card-list" id="card-list"></div>

<!-- 주의 문구 -->
<div class="notice-section">
  <div class="notice-text">
    <strong>참고용 계산 결과입니다.</strong> 실제 세액은 보유 조건, 지역, 주택 수, 세법 개정에 따라 달라질 수 있어요.
  </div>
</div>

<!-- 상담 섹션 -->
<div class="consult-section">
  <div class="consult-title">정확한 검토가 필요하신가요?</div>
  <div class="consult-desc">계산 결과를 바탕으로 전문가 상담을 연결해 드립니다.</div>
  <button class="btn-consult" onclick="location.href='consulting.html'">상담 문의하기</button>
</div>

<div class="tab-spacer"></div>

<!-- 탭바 -->
<nav class="tab-bar">
  <button class="tab-item active">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>홈</span>
  </button>
  <button class="tab-item" onclick="document.getElementById('card-list').scrollIntoView({behavior:'smooth'})">
    <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="15" x2="13" y2="15"/></svg>
    <span>계산기</span>
  </button>
  <button class="tab-item" onclick="location.href='consulting.html'">
    <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    <span>문의</span>
  </button>
</nav>

<script>
const CALCULATORS = [
  {
    icon: '🏠',
    title: '취득세 계산기',
    desc: '부동산을 살 때 내야 할 세금',
    link: 'acquisition.html',
  },
  {
    icon: '🎁',
    title: '증여세 계산기',
    desc: '부동산을 증여할 때 예상 세금',
    link: 'gift.html',
  },
  {
    icon: '📋',
    title: '상속세 계산기',
    desc: '상속 재산 기준 예상 세금',
    link: 'https://inherit-template.netlify.app/inheritance.html',
  },
  {
    icon: '📈',
    title: '양도세 계산기',
    desc: '부동산을 팔 때 발생하는 세금',
    link: 'capital_gains_tax.html',
  },
];

const list = document.getElementById('card-list');

CALCULATORS.forEach(calc => {
  const card = document.createElement('div');
  card.className = 'calc-card';
  card.innerHTML = `
    <div class="card-icon">${calc.icon}</div>
    <div class="card-body">
      <div class="card-title">${calc.title}</div>
      <div class="card-desc">${calc.desc}</div>
    </div>
    <div class="card-arrow">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  `;
  card.addEventListener('click', () => {
    if (location.protocol === 'file:') {
      showToast('Netlify 배포 후 정상 작동합니다');
      return;
    }
    location.href = calc.link;
  });
  list.appendChild(card);
});

function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#191f28;color:#fff;font-size:13px;font-weight:600;padding:12px 20px;border-radius:12px;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

window.addEventListener('scroll', () => {
  document.getElementById('header').classList.toggle('scrolled', window.scrollY > 4);
});
</script>
</body>
</html>
